services:
  - type: web
    name: pixelita-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: REPORT_TOKEN
        sync: false
      - key: PIXELITA_LOG_FILE
        value: /var/data/pixel_log.csv
    disk:
      name: pixelita-data
      mountPath: /var/data
      sizeGB: 1
